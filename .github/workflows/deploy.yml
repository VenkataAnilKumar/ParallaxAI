name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate Railway token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "::error::Missing GitHub secret RAILWAY_TOKEN. Create a Railway project token with access to this project's services and add it to the repository or organization Actions secrets."
            exit 1
          fi

      - name: Deploy API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service parallax-api --detach

      - name: Deploy Worker
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service parallax-worker --detach

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::error::Missing GitHub secret VERCEL_TOKEN. Create a Vercel token and add it to the repository or organization Actions secrets."
            exit 1
          fi

          if [ -z "${VERCEL_ORG_ID:-}" ]; then
            echo "::error::Missing GitHub secret VERCEL_ORG_ID. Copy it from your Vercel project settings and add it to Actions secrets."
            exit 1
          fi

          if [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "::error::Missing GitHub secret VERCEL_PROJECT_ID. Copy it from your Vercel project settings and add it to Actions secrets."
            exit 1
          fi

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"
