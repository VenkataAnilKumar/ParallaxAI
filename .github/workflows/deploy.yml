name: Deploy

on:
  push:
    branches: [main]

jobs:
  deployment-readiness:
    name: Check Deployment Readiness
    runs-on: ubuntu-latest
    outputs:
      backend_ready: ${{ steps.readiness.outputs.backend_ready }}
      frontend_ready: ${{ steps.readiness.outputs.frontend_ready }}
    steps:
      - name: Check deploy secrets
        id: readiness
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          backend_ready=true
          frontend_ready=true

          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "::notice::Skipping Railway deploy. GitHub secret RAILWAY_TOKEN is not configured."
            backend_ready=false
          fi

          if [ -z "${VERCEL_TOKEN:-}" ] || [ -z "${VERCEL_ORG_ID:-}" ] || [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "::notice::Skipping Vercel deploy. One or more Vercel GitHub secrets are not configured."
            frontend_ready=false
          fi

          echo "backend_ready=${backend_ready}" >> "$GITHUB_OUTPUT"
          echo "frontend_ready=${frontend_ready}" >> "$GITHUB_OUTPUT"

  deploy-backend:
    name: Deploy Backend to Railway
    needs: deployment-readiness
    if: ${{ needs.deployment-readiness.outputs.backend_ready == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service parallax-api --detach

      - name: Deploy Worker
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service parallax-worker --detach

  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: deployment-readiness
    if: ${{ needs.deployment-readiness.outputs.frontend_ready == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"
