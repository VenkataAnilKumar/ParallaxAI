version: '3.9'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: parallax_db
    environment:
      POSTGRES_DB: parallax
      POSTGRES_USER: parallax
      POSTGRES_PASSWORD: parallax
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parallax"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: parallax_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parallax_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://parallax:parallax@db:5432/parallax
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parallax_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://parallax:parallax@db:5432/parallax
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run celery -A app.celery_app worker --loglevel=info --concurrency=4

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parallax_flower
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - worker
    command: uv run celery -A app.celery_app flower --port=5555

volumes:
  postgres_data:
